<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compact T.E.N Register</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Container for search + add button aligned */
  #top-bar {
    display: flex;
    align-items: center;
    gap: 8px; /* space between search and add button */
    margin-bottom: 10px; /* small gap below top bar */
  }

  /* Search box styling */
  #search-box {
    padding: 4px 8px;
    font-size: 14px;
    border-radius: 4px;
    border: 1px solid #ccc;
  }
</style>
</head>
<body>

  <div id="app-wrapper">
    <h2 class="app-title">T.E.N<span class="app-subtitle">Compact Register</span></h2>

    <!-- Top bar: Search + Title Input + Add + Export/Import -->
    <div id="top-bar">
      <!-- Search Box -->
      <input type="text" id="search-box" placeholder="Search..." autocomplete="off">

      <!-- Title Input -->
      <input type="text" id="title" placeholder="Title" autocomplete="off">

      <!-- Add Task Button -->
      <button id="addBtn">+</button>

      <!-- Export / Import Buttons -->
      <button onclick="exportData()">Export</button>
      <input type="file" id="importFile" accept=".json" style="display:none"
             onchange="importData(this.files[0])">
      <button onclick="document.getElementById('importFile').click()">Import</button>
    </div>

    <!-- Tags in one line -->
    <div id="tags-container" class="tag-container">
      <!-- Type tags -->
      <span class="tag selected" data-value="T">Task</span>
      <span class="tag" data-value="E">Event</span>
      <span class="tag" data-value="N">Note</span>
      <span class="separator">|</span>
      <!-- Category tags -->
      <span class="tag selected" data-value="H">Home</span>
      <span class="tag" data-value="W">Work</span>
      <span class="tag" data-value="P">Personal</span>
    </div>

    <!-- Filters -->
    <div id="filter-container">
      <select id="filter-type">
        <option value="">All Types</option>
        <option value="T">Task</option>
        <option value="E">Event</option>
        <option value="N">Note</option>
      </select>
      <select id="filter-category">
        <option value="">All Categories</option>
        <option value="H">Home</option>
        <option value="W">Work</option>
        <option value="P">Personal</option>
      </select>
      <button id="clear-filters">Clear</button>
    </div>

    <!-- Active Items -->
    <h2>Items</h2>
    <div id="item-list"></div>

    <!-- Recycle Bin -->
    <h2><button id="toggle-bin">Show/Hide Recycle Bin</button></h2>
    <div id="recycle-bin-list" style="display:none;"></div>
  </div>

  <script src="app.js"></script>
  <script>
    // --- Search Functionality ---
    const searchBox = document.getElementById('search-box');

    // Filter items as you type
    searchBox.addEventListener('input', function() {
      const query = this.value.toLowerCase();
      const items = document.querySelectorAll('#item-list .item'); // ensure each item has class 'item'
      items.forEach(item => {
        item.style.display = item.textContent.toLowerCase().includes(query) ? '' : 'none';
      });
    });

    // Ctrl + / or Cmd + / to focus search
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === '/') {
        e.preventDefault();
        searchBox.focus();
      }
    });
  </script>
</body>
</html>
