<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compact T.E.N Register</title>
<link rel="stylesheet" href="style.css">
<style>
  /* Independent search box styling */
  #search-bar-container {
    position: absolute;
    left: 10px;  /* distance from left edge */
    z-index: 1000;
  }

  #search-box {
    padding: 6px 10px;   /* slightly bigger */
    font-size: 15px;     /* slightly bigger text */
    border-radius: 4px;
    border: 1px solid #ccc;
    width: 180px;        /* wider */
  }
</style>
</head>
<body>

  <!-- Independent search box -->
  <div id="search-bar-container">
    <input type="text" id="search-box" placeholder="Search..." autocomplete="off">
  </div>

  <!-- Main App Wrapper (unchanged) -->
  <div id="app-wrapper">
    <h2 class="app-title">T.E.N<span class="app-subtitle">Compact Register</span></h2>

    <!-- Compact Input Form -->
    <div id="form-container">
      <input type="text" id="title" placeholder="Title" autocomplete="off">
      <button id="addBtn">+</button>
      <!-- Export / Import Buttons -->
      <button onclick="exportData()">Export</button>
      <input type="file" id="importFile" accept=".json" style="display:none"
             onchange="importData(this.files[0])">
      <button onclick="document.getElementById('importFile').click()">Import</button>
    </div>

    <!-- Tags in one line -->
    <div id="tags-container" class="tag-container">
      <span class="tag selected" data-value="T">Task</span>
      <span class="tag" data-value="E">Event</span>
      <span class="tag" data-value="N">Note</span>
      <span class="separator">|</span>
      <span class="tag selected" data-value="H">Home</span>
      <span class="tag" data-value="W">Work</span>
      <span class="tag" data-value="P">Personal</span>
    </div>

    <!-- Filters -->
    <div id="filter-container">
      <select id="filter-type">
        <option value="">All Types</option>
        <option value="T">Task</option>
        <option value="E">Event</option>
        <option value="N">Note</option>
      </select>
      <select id="filter-category">
        <option value="">All Categories</option>
        <option value="H">Home</option>
        <option value="W">Work</option>
        <option value="P">Personal</option>
      </select>
      <button id="clear-filters">Clear</button>
    </div>

    <!-- Active Items -->
    <h2>Items</h2>
    <div id="item-list"></div>

    <!-- Recycle Bin -->
    <h2><button id="toggle-bin">Show/Hide Recycle Bin</button></h2>
    <div id="recycle-bin-list" style="display:none;"></div>
  </div>

  <script src="app.js"></script>
  <script>
    const searchBoxContainer = document.getElementById('search-bar-container');
    const searchBox = document.getElementById('search-box');
    const addBtn = document.getElementById('addBtn');

    // Align search box top dynamically with Add button
    function alignSearchBox() {
      const addBtnRect = addBtn.getBoundingClientRect();
      const scrollTop = window.scrollY || window.pageYOffset;
      searchBoxContainer.style.top = (addBtnRect.top + scrollTop) + 'px';
    }

    // Initial alignment
    alignSearchBox();

    // Re-align on window resize or scroll
    window.addEventListener('resize', alignSearchBox);
    window.addEventListener('scroll', alignSearchBox);

    // --- Search functionality ---
    searchBox.addEventListener('input', function() {
      const query = this.value.toLowerCase();
      const items = document.querySelectorAll('#item-list > *'); // all children, no class needed
      items.forEach(item => {
        item.style.display = item.textContent.toLowerCase().includes(query) ? '' : 'none';
      });
    });

    // Ctrl + / or Cmd + / shortcut to focus search
    document.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === '/') {
        e.preventDefault();
        searchBox.focus();
      }
    });
  </script>
</body>
</html>
